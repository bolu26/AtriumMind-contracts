name: Testnet Deploy

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/testnet-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build + Deploy + Init on Stellar Testnet
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DEPLOYER_SECRET:   ${{ secrets.DEPLOYER_SECRET }}
      BACKEND_PUBLIC:    ${{ secrets.BACKEND_PUBLIC }}
      BACKEND_SECRET:    ${{ secrets.BACKEND_SECRET }}
      PUBLISHER1_PUBLIC: ${{ secrets.PUBLISHER1_PUBLIC }}
      PUBLISHER2_PUBLIC: ${{ secrets.PUBLISHER2_PUBLIC }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Stellar CLI v27
        run: |
          curl -sL \
            https://github.com/stellar/stellar-cli/releases/download/v27.0.0/stellar-cli-27.0.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin
          stellar --version

      - name: Configure testnet
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" 2>/dev/null || true

      - name: Fund accounts
        run: |
          DEPLOYER_PUB="GCJH6RF7EU7LRXZK3QPJD2XZ7ZL7GI67WUPVRWROJ6XDEJKHIKW7GFWX"
          for ADDR in "$DEPLOYER_PUB" "$BACKEND_PUBLIC" "$PUBLISHER1_PUBLIC" "$PUBLISHER2_PUBLIC"; do
            echo "Funding $ADDR"
            curl -sf "https://friendbot.stellar.org?addr=${ADDR}" > /dev/null && echo "  ✅" || echo "  ⚠️"
          done

      - name: Build all contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release \
            --package vault-registry \
            --package access-lease \
            --package subscription
          ls -lh target/wasm32-unknown-unknown/release/*.wasm

      - name: Deploy vault-registry
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/vault_registry.wasm \
            --source-account "$DEPLOYER_SECRET" \
            --network testnet --ignore-checks)
          echo "VAULT_REGISTRY=$ID" >> $GITHUB_ENV
          echo "::notice::vault-registry=$ID"

      - name: Deploy access-lease
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/access_lease.wasm \
            --source-account "$DEPLOYER_SECRET" \
            --network testnet --ignore-checks)
          echo "ACCESS_LEASE=$ID" >> $GITHUB_ENV
          echo "::notice::access-lease=$ID"

      - name: Deploy subscription
        run: |
          ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/subscription.wasm \
            --source-account "$DEPLOYER_SECRET" \
            --network testnet --ignore-checks)
          echo "SUBSCRIPTION=$ID" >> $GITHUB_ENV
          echo "::notice::subscription=$ID"

      - name: Init access-lease
        run: |
          stellar contract invoke \
            --id "$ACCESS_LEASE" \
            --source-account "$DEPLOYER_SECRET" \
            --network testnet \
            -- init --admin "$BACKEND_PUBLIC"

      - name: Init subscription
        run: |
          stellar contract invoke \
            --id "$SUBSCRIPTION" \
            --source-account "$DEPLOYER_SECRET" \
            --network testnet \
            -- init --admin "$BACKEND_PUBLIC"

      - name: Save + commit contract IDs
        run: |
          mkdir -p deployed
          cat > deployed/contract-ids.env << EOF
          vault_registry=$VAULT_REGISTRY
          access_lease=$ACCESS_LEASE
          subscription=$SUBSCRIPTION
          network=testnet
          deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployed/contract-ids.env
          git diff --cached --quiet || git commit -m "chore: deployed contract IDs [skip ci]"
          git push

      - name: Job summary
        run: |
          cat deployed/contract-ids.env
          echo "## ✅ AtriumMind Contracts on Stellar Testnet" >> $GITHUB_STEP_SUMMARY
          echo "| Contract | ID |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| vault-registry | \`$VAULT_REGISTRY\` |" >> $GITHUB_STEP_SUMMARY
          echo "| access-lease   | \`$ACCESS_LEASE\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| subscription   | \`$SUBSCRIPTION\` |"   >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View on Stellar Expert →](https://stellar.expert/explorer/testnet/contract/$VAULT_REGISTRY)" >> $GITHUB_STEP_SUMMARY
